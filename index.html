<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Peregrinas Master 🚀</title>
    <style>
        body { background: #000033; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; color: black; border-radius: 15px; padding: 15px; margin-bottom: 20px; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { color: #000033; margin-top: 0; border-bottom: 2px solid #FFD700; padding-bottom: 5px; }
        .btn-zap { background: #25D366; color: white; padding: 5px 10px; border-radius: 20px; text-decoration: none; font-size: 12px; float: right; font-weight: bold; }
        .ranking-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #ddd; }
        .lost-sheep-item { padding: 10px 0; border-bottom: 1px solid #eee; }
        .badge { background: #FFD700; color: black; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <h1 style="font-size: 22px;">Peregrinas Master 🚀</h1>

    <div class="card">
        <h2>🏆 Ranking de Fidelidade</h2>
        <div id="ranking-list">

        </div>
    </div>

    <div class="card">

    </div>

    <script>

        console.log("Sistema Peregrinas Pronto para os dados do Supabase!");

</html>

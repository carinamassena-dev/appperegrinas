<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Peregrinas App</title>
</head>
<body class="bg-gray-50 font-sans">
    <header class="bg-white shadow-sm p-4 border-b border-gray-200">
        <h1 class="text-xl font-bold text-center text-gray-800 tracking-wide uppercase">PEREGRINAS</h1>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-6">
            <h2 class="text-lg font-semibold text-gray-700">Boa tarde, Peregrina! 🌸</h2>
            <p class="text-sm text-gray-500">Gestão de 19 Líderes e 90 Discípulas</p>
        </div>

        <div class="space-y-3">
            <button class="w-full bg-black text-white py-4 rounded-xl font-bold flex justify-between px-6 items-center shadow-lg active:scale-95 transition">
                <span>GERENCIAR REDE</span>
                <span>➔</span>
            </button>
            
            <button class="w-full bg-yellow-400 text-black py-4 rounded-xl font-bold flex justify-between px-6 items-center shadow-lg active:scale-95 transition">
                <span>ESTATÍSTICAS MASTER 🚀</span>
                <span class="bg-white/50 px-2 py-1 rounded text-xs">NOVO</span>
            </button>
        </div>

        <div id="lista-fidelidade" class="mt-8">
            <h3 class="text-xs font-bold text-gray-400 uppercase mb-3">Ranking de Líderes</h3>
            <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center text-gray-400 text-sm italic">
                Sincronizando com Supabase...
            </div>
        </div>
    </main>
</body>
</html>

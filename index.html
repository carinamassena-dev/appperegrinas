
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peregrinas App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #f9fafb; }
        .bg-lime-peregrinas { background-color: #CCFF00; }
        .text-lime-peregrinas { color: #CCFF00; }
        .border-lime-peregrinas { border-color: #CCFF00; }
        .leaflet-container { width: 100%; height: 100%; border-radius: 2rem; z-index: 1; }
        
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        
        .leaflet-popup-content-wrapper { border-radius: 1.5rem; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; line-height: inherit; }

        /* S20 FE & Mobile Global Fixes */
        html, body, #root {
            max-width: 100vw;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        @media (max-width: 600px) {
            /* Evitar imagens vazando o fluxo */
            img { max-width: 100%; height: auto; }
            
            /* Add extra padding nas extremidades em grids pesadas */
            .fixed-mobile-padding { padding-left: 16px !important; padding-right: 16px !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-x-hidden">
    <div id="root"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
